<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="auth-card" id="login-card">
        <div class="auth-copy">
          <p class="eyebrow">Student Portal</p>
          <h1>Attendance Dashboard</h1>
          <p class="auth-sub">
            Sign in with your RFID UID to view your attendance records and scan
            history.
          </p>
        </div>

        <form id="login-form" class="auth-form">
          <label class="field-label" for="uid-input">Student UID</label>
          <input
            id="uid-input"
            name="uid"
            class="uid-input"
            type="text"
            placeholder="Enter RFID UID"
            autocomplete="off"
            required
          />
          <button class="login-btn" type="submit">View Dashboard</button>
          <p class="auth-error" id="login-error"></p>
        </form>
      </section>

      <section class="dashboard hidden" id="dashboard">
        <div class="topbar">
          <div class="header" id="profile-header"></div>
          <button class="logout-btn" id="logout-btn" type="button">Log Out</button>
        </div>

        <div class="tabs" id="tab-buttons"></div>
        <div id="tab-content"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
